<!DOCTYPE html>
<html>
<head>
    <title>basic form</title>
</head>
<body>
    <main>
        <section>
            <h3>basic form</h3>
            <form>
                <div>
                  <label form="name">name</label>
                  <input
                  type="text"
                  name="name"
                  id="name">
                  </div>

                  <div>
                    <label form="password">password</label>
                    <input
                      type="password"
                      name="password"
                      id="password">
                  </div>
                  </form>
        </section>
    </main>
    
</body>
</html>
