<!DOCTYPE html>
<html>
<head>
     <title>boolean attributes</title>
</head>
<body>
    <!--disabled attributes-->
    <button disabled>click me</button>
    <!--checked attributes-->
    <input type="checkbox" >
    <input type="checkbox" checked/>
    <input type="radio" >
    <input type="radio" checked/>

    <!--readonly-->

    <input types="text" name="first-name" id="first-name" value="i am vinosri" readonly>


    
</body>
</html>
