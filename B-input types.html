<!DOCTYPE html>
<html>
<head>
    <title>input types</title>
</head>
<body>
    <div>
        <label for="text-input">student name</label>
        <input
        type="text"
        name="sample text"
        id="text-input"
        value=""
        placeholder="Ex:VINOSRI"
    max="99">
    </div>

    <div>
        <label for="credital">password</label>
        <input
          type="password"
          name="sample text"
          id=""
          value="">
    </div>


    <div>
        <label form="email">email</label>
        <input
          type="email"
          name="email"
          id=""
          value="">
    </div>

    <div>
        <label form="date"></label>
        <input
           type="date"
           name="sample text"
           id=""
           value=""
           max="2004-11-27">
    </div>

    <div>
        <label form="week"></label>
        <input
           type="week"
           name="sample text"
           id=""
           value="">
    </div>

    
    
</body>
</html>
